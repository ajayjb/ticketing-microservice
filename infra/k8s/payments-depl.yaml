apiVersion: v1
kind: ConfigMap
metadata:
  name: ticketing-payments-config
data:
  PORT: "6000"
  LOG_LEVEL: "info"
  LOG_DIR: "logs"
  DB_NAME: "payments"
  DB_HOST: "mongo-payments-srv"
  DB_PORT: "27017"
  DB_MIN_POOL_SIZE: "5"
  DB_MAX_POOL_SIZE: "10"
  NATS_CLUSTER_ID: "tickets"
  NATS_URL: "nats://nats-srv:4222"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing-payments-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticketing-payments
  template:
    metadata:
      labels:
        app: ticketing-payments
    spec:
      containers:
        - name: ticketing-payments
          image: ajayjb/ticketing-payments:latest
          envFrom:
            - configMapRef:
                name: ticketing-payments-config
          env:
            - name: ENVIRONMENT
              valueFrom:
                secretKeyRef:
                  name: environment-secret
                  key: ENVIRONMENT
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: environment-secret
                  key: JWT_KEY
            - name: NATS_CLIENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ticketing-payments-secret
                  key: DB_USER
            - name: DB_USER_PWD
              valueFrom:
                secretKeyRef:
                  name: ticketing-payments-secret
                  key: DB_USER_PWD
            - name: STRIPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-secret
                  key: STRIPE_API_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: stripe-secret
                  key: STRIPE_WEBHOOK_SECRET

---
apiVersion: v1
kind: Service
metadata:
  name: ticketing-payments-srv
spec:
  type: ClusterIP
  selector:
    app: ticketing-payments
  ports:
    - name: ticketing-payments-srv-port
      protocol: TCP
      port: 6000
      targetPort: 6000

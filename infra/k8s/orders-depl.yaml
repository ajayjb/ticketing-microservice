apiVersion: v1
kind: ConfigMap
metadata:
  name: ticketing-orders-config
data:
  PORT: "6000"
  LOG_LEVEL: "info"
  LOG_DIR: "logs"
  DB_NAME: "orders"
  DB_HOST: "mongo-orders-srv"
  DB_PORT: "27017"
  DB_MIN_POOL_SIZE: "5"
  DB_MAX_POOL_SIZE: "10"
  NATS_CLUSTER_ID: "tickets"
  NATS_URL: "nats://nats-srv:4222"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing-orders-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticketing-orders
  template:
    metadata:
      labels:
        app: ticketing-orders
    spec:
      containers:
        - name: ticketing-orders
          image: ajayjb/ticketing-orders:latest
          envFrom:
            - configMapRef:
                name: ticketing-orders-config
          env:
            - name: ENVIRONMENT
              valueFrom:
                secretKeyRef:
                  name: environment-secret
                  key: ENVIRONMENT
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: environment-secret
                  key: JWT_KEY
            - name: NATS_CLIENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ticketing-orders-secret
                  key: DB_USER
            - name: DB_USER_PWD
              valueFrom:
                secretKeyRef:
                  name: ticketing-orders-secret
                  key: DB_USER_PWD

---
apiVersion: v1
kind: Service
metadata:
  name: ticketing-orders-srv
spec:
  type: ClusterIP
  selector:
    app: ticketing-orders
  ports:
    - name: ticketing-orders-srv-port
      protocol: TCP
      port: 6000
      targetPort: 6000

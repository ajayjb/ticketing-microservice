apiVersion: apps/v1
kind: Deployment
metadata:
  name: expiration-service-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: expiration-service
  template:
    metadata:
      labels:
        app: expiration-service
    spec:
      containers:
        - name: expiration-service
          image: ajayjb/expiration-service:latest
          env:
            - name: NATS_CLUSTER_ID
              value: "tickets"
            - name: NATS_URL
              value: "nats://nats-srv:4222"
            - name: NATS_CLIENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REDIS_HOST
              value: "expiration-redis-srv"
            - name: "REDIS_PORT"
              value: "6379"
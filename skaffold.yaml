apiVersion: skaffold/v4beta3
kind: Config
manifests:
  rawYaml:
    - ./infra/k8s/*
    - ./infra/k8s-development/*
build:
  local:
    push: false
  artifacts:
    - image: ajayjb/ticketing-auth
      context: ./auth
      docker:
        dockerfile: Dockerfile.dev
      sync:
        manual:
          - src: src/**/*.ts
            dest: ./
    - image: ajayjb/ticketing-tickets
      context: ./tickets
      docker:
        dockerfile: Dockerfile.dev
      sync:
        manual:
          - src: src/**/*.ts
            dest: ./
    - image: ajayjb/ticketing-client
      context: ./client
      docker:
        dockerfile: Dockerfile.dev
        buildArgs:
          NEXT_PUBLIC_ENVIRONMENT: "development"
          NEXT_PUBLIC_DOMAIN: "http://tickets.com"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_51LCOrSSBLPrtDVWN0Vzn7ebH0VoyAiKKJi0afxYvcQItFTW0uIjT54IQpu0fkVLvmQqSVGUeB3TGZwBGxTkjqo2M007k1MKEmg"
      sync:
        manual:
          - src: src/**/*.tsx
            dest: ./
          - src: src/**/*.jsx
            dest: ./
          - src: src/**/*.ts
            dest: ./
          - src: src/**/*.js
            dest: ./
    - image: ajayjb/ticketing-orders
      context: ./orders
      docker:
        dockerfile: Dockerfile.dev
      sync:
        manual:
          - src: src/**/*.ts
            dest: ./
    - image: ajayjb/expiration-service
      context: ./expiration-service
      docker:
        dockerfile: Dockerfile.dev
      sync:
        manual:
          - src: src/**/*.ts
            dest: ./
    - image: ajayjb/ticketing-payments
      context: ./payments
      docker:
        dockerfile: Dockerfile.dev
      sync:
        manual:
          - src: src/**/*.ts
            dest: ./
name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: auth/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: auth

      - name: Run tests
        run: yarn test:ci
        working-directory: auth

name: deploy-expiration-service

on:
  push: 
    branches:
      - main
    paths:
      - "expiration-service/**/*"

env:
  IMAGE_TAG: ajayjb/expiration-service:latest

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build image
        run: docker build -t ${{ env.IMAGE_TAG }} .
        working-directory: expiration-service

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image to Docker Hub
        run: docker push ${{ env.IMAGE_TAG }}

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DigitalOcean kubeconfig with short-lived credentials
        run: doctl kubernetes cluster kubeconfig save --expiry-seconds 600 ticketing-production

      - name: Restart deployment
        run: kubectl rollout restart deployment expiration-service-depl
